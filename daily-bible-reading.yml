name: 每日读经推送

on:
  schedule:
    # 每天 UTC 23:00 执行 = 北京时间早上 7:00
    - cron: '0 23 * * *'
  workflow_dispatch:  # 允许手动触发测试

jobs:
  daily-reading:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: 执行读经推送
      env:
        SENDKEY: ${{ secrets.SENDKEY }}
      run: |
        python bible-reading.py
